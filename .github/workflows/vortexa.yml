name: VortexA

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:  # 允许手动触发测试

# 赋予工作流删除自身旧运行记录的权限
permissions:
  actions: write
  contents: read

jobs:
  vortexa:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Shanghai
      VORTEXA_USER: ${{ secrets.VORTEXA_USER }}
      VORTEXA_PASS: ${{ secrets.VORTEXA_PASS }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: 检出公库代码
        uses: actions/checkout@v4

      - name: 跨库拉取私库核心脚本
        uses: actions/checkout@v4
        with:
          repository: '${{ github.repository_owner }}/vortexa-scripts'
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: 'vortexa.py'
          sparse-checkout-cone-mode: false

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装基础依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright

      - name: 初始化 Playwright 内置浏览器
        run: |
          playwright install chromium --with-deps

      - name: 运行浏览器仿真破盾
        run: |
          python vortexa.py

      - name: 如果失败则上传错误截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vortexa-error-screenshot
          path: logs/
          retention-days: 3

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
